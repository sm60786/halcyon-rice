# mpv config for halcyon
#
# Show the current track title in the TERMINAL during audio-only playback
# (e.g. yt-x "Listen to All"). yt-x builds an .m3u8 with per-track titles,
# so ${media-title} resolves to the song name.

# Printed once each time a new track starts (the song name):
term-playing-msg=♪ Now playing: ${media-title}

# Persistent bottom status line = just the timer (title already shown above):
term-status-msg=⏱  ${time-pos} / ${duration}
