# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // █ █▄░█ █▀█ █░█ ▀█▀
# // █ █░▀█ █▀▀ █▄█ ░█░


misc {
	allow_session_lock_restore = 1
}

cursor {
    no_hardware_cursors = true  # Use software cursors for better compatibility
    hide_on_key_press = false
}



#  Uncomment to enable // change to a preferred value
# 🔗 See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    # kb_layout = us
    follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # 🔗 See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
        # Lower = less scrolling per swipe (default 1.0). Tweak to taste.
        scroll_factor = 0.2
        # Tap gestures: 1 finger = left, 2 = right, 3 = middle click
        # (a 3-finger tap closes browser tabs, opens links in new tab, etc.)
        # NOTE: physical clicks keep the default button-areas layout
        # (bottom-left = left, bottom-right = right, bottom-middle = middle),
        # so single-click right-click in the corner still works.
        tap-to-click = yes
    }

}



# 🔗 See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# █▀▀ ▄▀█ █▀█ █▀
# █▄█ █▀█ █▀▀ ▄█
# Shrink the gap between Waybar and windows. gaps_out order: top, right, bottom, left.
# Top is small (2) so windows sit close under the bar; sides/bottom stay at 8.
general {
    gaps_out = 2, 8, 8, 8
}

# █░█░█ █ █▀▀ █   █▀▀ █ ▀▄▀
# ▀▄▀▄▀ █ █▀░ █   █▀░ █ █░█
# WiFi and Network Management Fixes

# Network Manager applet
exec-once = nm-applet --indicator &

# Authentication agents
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# WiFi restart fix for connection issues after reboot/unlock
exec-once = sleep 5 && nmcli radio wifi off && sleep 2 && nmcli radio wifi on

# Optional: Force connect to specific network (uncomment and modify if needed)
# exec-once = sleep 8 && nmcli device wifi connect "Your-WiFi-Name"


# █▀▀ ▀▄▀ ▀█▀ █▀█ ▄▀█ █▀
# ██▄ █░█ ░█░ █▀▄ █▀█ ▄█
# Extra features adapted from RuhanShafi/Hyprland-Dotfiles (kept HyDE-safe)

# Automatic time-of-day night light (warm evenings) via HyDE's hyprsunset.
exec-once = ~/.config/hypr/scripts/auto-sunset.sh

# Reading mode: toggle HyDE's "paper" e-ink screen shader to cut eye strain.
bindd = $mainMod Shift, B, reading mode (paper shader), exec, ~/.config/hypr/scripts/reading-mode.sh

# Productivity utilities (adapted from JaKooLit / Hyprlust, wallbash-themed)
# Rofi web search -> default browser.
bindd = $mainMod Control, G, web search, exec, pkill -x rofi || ~/.config/hypr/scripts/rofi-search.sh

# Open yazi (terminal file manager) with Super+E instead of the GUI explorer.
unbind = $mainMod, E
bindd = $mainMod, E, file manager (yazi), exec, kitty -e yazi
