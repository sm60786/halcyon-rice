# █░█░█ █ █▄░█ █▀▄ █▀█ █░█░█   █▀█ █░█ █░░ █▀▀ █▀
# ▀▄▀▄▀ █ █░▀█ █▄▀ █▄█ ▀▄▀▄▀   █▀▄ █▄█ █▄▄ ██▄ ▄█
# See https://wiki.hyprland.org/Configuring/Window-Rules/
# '$&' is a hyde specific shorthand for "override" \\ analogous to a reference
# This symbol indicates that the following values will override the default configuration
$&=override
# idleinhibit rules
windowrule = idle_inhibit fullscreen, match:class ^(.*celluloid.*|.*mpv.*|.*vlc.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*[Ss]potify.*)$
windowrule = idle_inhibit fullscreen, match:class ^(.*LibreWolf.*|.*floorp.*|.*brave-browser.*|.*firefox.*|.*chromium.*|.*zen.*|.*vivaldi.*)$
# Picture-in-Picture
windowrule = float on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = keep_aspect_ratio on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = pin on, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = move 73% 72%, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
windowrule = size 25% 25%, match:title ^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture).*
# Opacity rules
windowrule = opacity 0.90 0.90, match:class ^(firefox|brave-browser)$
windowrule = opacity 0.80 0.80, match:class ^(code|code-oss|code-url-handler|code-insiders-url-handler)$
windowrule = opacity 0.80 0.80, match:class ^(kitty|org.kde.dolphin|org.kde.ark|nwg-look|qt5ct|qt6ct|kvantummanager)$
windowrule = opacity 0.80 0.70, match:class ^(org.pulseaudio.pavucontrol|blueman-manager|nm-applet|nm-connection-editor)$
windowrule = opacity 0.80 0.70, match:class ^(org.kde.polkit-kde-authentication-agent-1|polkit-gnome-authentication-agent-1)$
windowrule = opacity 0.80 0.70, match:class ^(org.freedesktop.impl.portal.desktop.(gtk|hyprland))$
windowrule = opacity 0.70 0.70, match:class ^(steam|steamwebhelper|spotify)$
windowrule = opacity 0.70 0.70, match:initial_title ^(Spotify (Free|Premium))$
####################
# GTK / Flatpak apps
####################
windowrule = opacity 0.80 0.80, match:class ^(vesktop|discord|WebCord|ArmCord)$
windowrule = opacity 0.80 0.80, match:class ^(Signal|yad|eog)$
windowrule = opacity 0.80 0.80, match:class ^(app.drey.Warp|net.davidotek.pupgui2)$
windowrule = opacity 0.80 0.80, match:class ^(io.github.alainm23.planify|io.gitlab.theevilskeleton.Upscaler)$
windowrule = opacity 0.80 0.80, match:class ^(com.github.unrud.VideoDownloader|io.gitlab.adhami3310.Impression)$
windowrule = opacity 0.80 0.80, match:class ^(io.missioncenter.MissionCenter)$
##########################
# Floating utility windows
##########################
windowrule = float on, match:class ^(org.kde.dolphin)$ match:title ^(Progress Dialog — Dolphin|Copying — Dolphin)$
windowrule = float on, match:title ^(About Mozilla Firefox|Library)$
windowrule = float on, match:class ^(kitty)$ match:title ^(top|btop|htop)$
windowrule = float on, match:class ^(vlc|kvantummanager|qt5ct|qt6ct|nwg-look|org.kde.ark)$
windowrule = float on, match:class ^(org.pulseaudio.pavucontrol|blueman-manager|nm-applet|nm-connection-editor)$
windowrule = float on, match:class ^(org.kde.polkit-kde-authentication-agent-1)$
#########################
# Common dialogs / modals
#########################
windowrule = float on, match:title ^(Open|Save As|Choose Files|Authentication Required)$
windowrule = float on, match:title ^(File Operation Progress|Confirm to replace files)$
windowrule = float on, match:title ^(File Upload|Choose wallpaper|Library).*
windowrule = float on, match:class ^(.*dialog.*|xdg-desktop-portal-gtk)$
########################
# JetBrains popup fix
########################
windowrule = no_initial_focus on, match:class ^(.*jetbrains.*)$ match:title ^(win[0-9]+)$
########################
# Layer rules (blur)
########################
layerrule = blur on,match:namespace rofi
layerrule = ignore_alpha 1,match:namespace rofi
layerrule = blur on,match:namespace notifications
layerrule = ignore_alpha 1,match:namespace notifications
layerrule = blur on,match:namespace swaync-notification-window
layerrule = ignore_alpha 1,match:namespace swaync-notification-window
layerrule = blur on,match:namespace swaync-control-center
layerrule = ignore_alpha 1,match:namespace swaync-control-center
layerrule = blur on,match:namespace logout_dialog
layerrule = ignore_alpha 1,match:namespace logout_dialog
########################
# Hide screen sharing indicator dialogs (Teams, Meet, etc.)
########################
windowrule = workspace special:sharing silent, match:title ^(.*is sharing (your screen|a window|your entire screen|a tab).*)$
windowrule = no_focus on, match:title ^(.*is sharing (your screen|a window|your entire screen|a tab).*)$
windowrule = no_initial_focus on, match:title ^(.*is sharing (your screen|a window|your entire screen|a tab).*)$