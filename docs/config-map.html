<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>halcyon · .config map</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c232c; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --halcyon:#f0883e; --hyde:#a371f7; --script:#3fb950; --warn:#d29922;
    --mono:'JetBrains Mono','CaskaydiaCove Nerd Font Mono',ui-monospace,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:14px/1.55 -apple-system,Segoe UI,Roboto,sans-serif;display:flex;flex-direction:column}
  header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:14px;align-items:center;flex-wrap:wrap;background:var(--panel)}
  header h1{font-size:16px;margin:0;font-family:var(--mono)}
  header .sub{color:var(--muted);font-size:12px}
  .search{flex:1;min-width:180px;max-width:360px}
  .search input{width:100%;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font:inherit}
  .legend{display:flex;gap:12px;font-size:12px;color:var(--muted)}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600;font-family:var(--mono)}
  .b-halcyon{background:#3a2616;color:var(--halcyon);border:1px solid #5a3a1e}
  .b-hyde{background:#2a2140;color:var(--hyde);border:1px solid #42306b}
  .b-script{background:#143b1d;color:var(--script);border:1px solid #1f5a2a}
  main{flex:1;display:grid;grid-template-columns:340px 1fr;min-height:0}
  #tree{overflow:auto;border-right:1px solid var(--border);padding:8px 6px;background:var(--panel)}
  #detail{overflow:auto;padding:20px 26px}
  .dir{margin:2px 0}
  .dir > .label{cursor:pointer;padding:3px 6px;border-radius:6px;display:flex;align-items:center;gap:6px;color:var(--fg);user-select:none}
  .dir > .label:hover{background:var(--panel2)}
  .dir > .label .caret{width:10px;color:var(--muted);font-size:10px}
  .dir.collapsed > .children{display:none}
  .dir.collapsed > .label .caret::before{content:'▸'}
  .dir > .label .caret::before{content:'▾'}
  .children{margin-left:14px;border-left:1px dashed var(--border);padding-left:6px}
  .file{cursor:pointer;padding:3px 6px;border-radius:6px;display:flex;align-items:center;gap:8px;white-space:nowrap}
  .file:hover{background:var(--panel2)}
  .file.active{background:#1f2a3a;outline:1px solid var(--accent)}
  .file .name{font-family:var(--mono);font-size:12.5px;overflow:hidden;text-overflow:ellipsis}
  .file .mini{font-size:9px;padding:0 5px;border-radius:8px}
  .pathbar{font-family:var(--mono);font-size:12px;color:var(--muted);margin-bottom:14px;word-break:break-all}
  h2{margin:0 0 4px;font-size:18px}
  .purpose{color:var(--muted);margin:0 0 18px;max-width:80ch}
  .callout{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--warn);padding:10px 14px;border-radius:6px;margin:0 0 18px;max-width:80ch;font-size:13px}
  table{border-collapse:collapse;width:100%;max-width:1100px;font-size:13px}
  th,td{text-align:left;border:1px solid var(--border);padding:8px 10px;vertical-align:top}
  th{background:var(--panel2);color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
  td.param{font-family:var(--mono);color:var(--accent);white-space:nowrap}
  td.val{font-family:var(--mono);color:var(--halcyon);white-space:pre-wrap}
  tr:nth-child(even) td{background:rgba(255,255,255,.015)}
  .section{font-family:var(--mono);color:var(--muted);font-size:12px;margin:26px 0 10px;border-bottom:1px solid var(--border);padding-bottom:4px}
  .empty{color:var(--muted);font-style:italic}
  .kbd{font-family:var(--mono);background:var(--panel2);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:12px}
  mark{background:#3d2a00;color:var(--warn);border-radius:3px}
  @media(max-width:820px){main{grid-template-columns:1fr}#tree{max-height:38vh}}
</style>
</head>
<body>
<header>
  <h1>halcyon · .config map</h1>
  <span class="sub">every tracked config file · what each setting controls &amp; the impact of changing it</span>
  <div class="search"><input id="q" placeholder="Filter files / settings / keys…" autocomplete="off"></div>
  <div class="legend">
    <span class="badge b-halcyon">halcyon</span>
    <span class="badge b-hyde">HyDE</span>
    <span class="badge b-script">script</span>
  </div>
</header>
<main>
  <nav id="tree"></nav>
  <section id="detail"><p class="empty">Pick a file on the left, or search above. halcyon-owned files show a per-setting table; HyDE-managed files show their purpose + why we don't edit them.</p></section>
</main>

<!--
  DATA: each entry = one tracked file under .config (+ ~/.tmux.conf, .config/mpv).
  owner: halcyon | hyde | script
  purpose: short
  note (optional): callout
  settings (optional): [{p:value, c:controls, i:impact}]
  Add a file = add an entry. Keep the JSON valid (trailing commas not allowed).
-->

   {"p":"format=1 / format=4","c":"wttr.in output detail","i":"1 = '☁ +20°C (City)'; 4 = full one-line summary for the tooltip."},
   {"p":"retry loop {1..5}","c":"Resilience","i":"wttr.in rate-limits occasionally; retries with 2s backoff."}
  ]},
 {"path":".config/waybar/scripts/audiopicker.sh","owner":"hyde","purpose":"HyDE audio device picker (rofi) — used by the volume modules' right-click."},
 {"path":".config/waybar/includes/includes.json","owner":"halcyon","purpose":"Master include list for Waybar modules + a few global overrides (icon sizes, position).",
  "settings":[
   {"p":"include[]","c":"Load order of module files","i":"FIRST-WINS: earlier entries override later ones. Our modules/* glob loads before HyDE's ~/.local/share ones, so our overrides win."},
   {"p":"tray / wlr-taskbar icon-size","c":"Icon sizing","i":"Pixel sizes + multipliers for the tray and taskbar."},
   {"p":"position: top","c":"Bar edge","i":"Override here to move the bar globally (bottom/left/right)."}
  ]},
 {"path":".config/waybar/includes/*.css","owner":"hyde","purpose":"Global + border-radius CSS for Waybar (wallbash-managed)."},
 {"path":".config/waybar/style.css","owner":"hyde","purpose":"Active Waybar stylesheet (generated)."},
 {"path":".config/waybar/theme.css","owner":"hyde","purpose":"Wallbash theme CSS for Waybar."},
 {"path":".config/waybar/user-style.css","owner":"hyde","purpose":"User CSS overrides for Waybar (safe place for hand CSS edits)."},

 {"path":".config/wlogout/","owner":"hyde","purpose":"Power menu (logout/lock/reboot/shutdown/suspend/hibernate) — layouts, styles, icons."},

 {"path":".config/yazi/yazi.toml","owner":"halcyon","purpose":"Terminal file manager config.",
  "settings":[
   {"p":"[mgr] show_hidden","c":"Show dotfiles by default","i":"true = hidden files visible on open. false = toggle with 'z'."},
   {"p":"sort_by","c":"Sort key","i":"'natural' = human order (file2 before file10). 'alphabetical' = strict. 'size'/'mtime' also available."},
   {"p":"sort_dir_first","c":"Directories on top","i":"true = folders first regardless of sort. false mixes files+dirs."},
   {"p":"linemode","c":"What the right column shows","i":"'size' = file size. 'none'/'mtime'/'permissions'/'btime' alternatives."},
   {"p":"[preview] max_width/height","c":"Image preview cap (px)","i":"1000 = previews downscaled to 1000px. Lower = faster previews, less detail."}
  ]},

 {"path":".config/mpv/mpv.conf","owner":"halcyon","purpose":"mpv config — surfaces the current song title/time in the terminal during yt-x 'Listen' (audio-only).",
  "settings":[
   {"p":"term-playing-msg","c":"Printed once when a track starts","i":"'♪ Now playing: ${media-title}'. Resolves from yt-x's .m3u8 EXTINF title. Change the prefix glyph freely."},
   {"p":"term-status-msg","c":"Persistent bottom line while playing","i":"'⏱ ${time-pos} / ${duration}' = timer only (title already shown above). Add ${media-title} back if you want it repeated."}
  ]},

 {"path":".tmux.conf","owner":"halcyon","purpose":"tmux config — prefix, splits, vi copy, TPM plugins, Catppuccin theme.",
  "settings":[
   {"p":"prefix C-a","c":"tmux prefix key","i":"Ctrl-a (unbinds default C-b). Press it before any tmux command."},
   {"p":"bind | / -","c":"Split panes (keep cwd)","i":"| = vertical split, - = horizontal. -c keeps the current directory."},
   {"p":"bind r","c":"Reload config","i":"prefix + r re-sources ~/.tmux.conf and confirms."},
   {"p":"bind -r j/k/l/h","c":"Resize pane (repeatable)","i":"prefix + j/k = down/up, l/h = right/left, by 5 cells. -r = hold to repeat. m = maximize toggle."},
   {"p":"base-index / pane-base-index = 1","c":"Numbering starts at 1","i":"More natural than 0; pairs with keyboard layouts."},
   {"p":"renumber-windows on","c":"Auto-compact window numbers","i":"Closing window 2 renumbers 3→2. Off = gaps left in numbering."},
   {"p":"mode-keys vi + v/y","c":"vi-style copy mode","i":"v = begin selection, y = yank. Mouse-drag copy disabled to avoid clobbering."},
   {"p":"@resurrect / @continuum","c":"Save & restore sessions across reboots","i":"capture-pane-contents on + restore on. Disable if you want clean sessions."},
   {"p":"@catppuccin_flavour 'mocha'","c":"Theme variant","i":"mocha/latte/frappe/macchiato. Change for a different palette."},
   {"p":"@catppuccin_status_modules_right","c":"Right status modules","i":"application session date_time. Reorder/remove to customize the status bar."}

<script>
(function(){
  const data = JSON.parse(document.getElementById('config-data').textContent);
  const treeEl = document.getElementById('tree');
  const detailEl = document.getElementById('detail');
  const qEl = document.getElementById('q');
  const ownerLabel = {halcyon:'halcyon', hyde:'HyDE', script:'script'};
  const ownerClass = {halcyon:'b-halcyon', hyde:'b-hyde', script:'b-script'};

  // Build a nested tree from flat paths.
  function buildTree(paths){
    const root = {name:'', dirs:{}, files:[]};
    for(const p of paths){
      const parts = p.split('/');
      let node = root;
      for(let i=0;i<parts.length-1;i++){
        const n = parts[i];
        node.dirs[n] = node.dirs[n] || {name:n, dirs:{}, files:[], parent:node};
        node = node.dirs[n];
      }
      node.files.push({path:p, leaf:parts[parts.length-1]});
    }
    return root;
  }

  const byPath = {};
  data.forEach(d => byPath[d.path] = d);
  // collapse runs of similar HyDE siblings to keep the tree readable
  const tree = buildTree(data.map(d => d.path));

  function nodeFor(d){
    return `<span class="badge mini ${ownerClass[d.owner]||'b-hyde'}">${ownerLabel[d.owner]||d.owner}</span>`;
  }

  function renderDir(node, root){
    const dirKeys = Object.keys(node.dirs).sort();
    const isRoot = node === root;
    const label = isRoot ? '.config' : node.name;
    const html = `<div class="dir${isRoot?'':' collapsed'}">` +
      `<div class="label"><span class="caret"></span>${label}</div><div class="children">`;
    let body = '';
    dirKeys.forEach(k => body += renderDir(node.dirs[k], root));
    node.files.slice().sort((a,b)=>a.leaf.localeCompare(b.leaf)).forEach(f => {
      const d = byPath[f.path];
      body += `<div class="file" data-path="${f.path}">${nodeFor(d||{owner:'hyde'})}<span class="name">${f.leaf}</span></div>`;
    });
    return html + body + `</div></div>`;
  }
  treeEl.innerHTML = renderDir(tree, tree);

  // expand/collapse
  treeEl.addEventListener('click', e => {
    const dir = e.target.closest('.dir > .label');
    if(dir){ dir.parentElement.classList.toggle('collapsed'); return; }
    const file = e.target.closest('.file');
    if(file){ select(file.dataset.path, file); }
  });

  function escape(s){ return (s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  function renderDetail(d){
    if(!d) return `<p class="empty">No notes for this file yet.</p>`;
    let h = `<div class="pathbar">${escape(d.path)}</div>`;
    h += `<h2>${escape(d.path.split('/').pop())} <span class="badge ${ownerClass[d.owner]||'b-hyde'}">${ownerLabel[d.owner]||d.owner}</span></h2>`;
    h += `<p class="purpose">${escape(d.purpose)}</p>`;
    if(d.note) h += `<div class="callout">${escape(d.note)}</div>`;
    if(d.settings && d.settings.length){
      h += `<div class="section">Settings — what they control &amp; the impact of changing them</div>`;
      h += `<table><thead><tr><th>Setting</th><th>Value / knob</th><th>What it controls</th><th>Impact of changing it</th></tr></thead><tbody>`;
      d.settings.forEach(s => {
        h += `<tr><td class="param">${escape(s.p)}</td><td class="val">${escape(s.v||'—')}</td><td>${escape(s.c)}</td><td>${escape(s.i)}</td></tr>`;
      });
      h += `</tbody></table>`;
    } else if(d.owner==='hyde'){
      h += `<div class="callout" style="border-left-color:var(--hyde)">HyDE-managed — often regenerated by wallbash / HyDE scripts. We avoid hand-editing these; our overrides live in user-owned files (see halcyon entries).</div>`;
    }
    return h;
  }

  function select(path, el){
    document.querySelectorAll('.file.active').forEach(f => f.classList.remove('active'));
    if(el) el.classList.add('active');
    detailEl.innerHTML = renderDetail(byPath[path]);
    detailEl.scrollTop = 0;
  }

  // search: filter tree + match settings keys/controls/impact
  function filter(q){
    q = q.trim().toLowerCase();
    if(!q){
      document.querySelectorAll('.file, .dir').forEach(el => el.style.display='');
      return;
    }
    const matchFile = (path) => {
      const d = byPath[path]; if(!d) return path.toLowerCase().includes(q);
      if(path.toLowerCase().includes(q)) return true;
      if((d.purpose||'').toLowerCase().includes(q)) return true;
      return (d.settings||[]).some(s => (s.p+s.c+s.i+(s.v||'')).toLowerCase().includes(q));
    };
    // walk tree, hide non-matching files, hide dirs with no visible descendants
    function walk(node){
      let anyVisible = false;
      Object.values(node.dirs).forEach(child => { if(walk(child)) anyVisible=true; });
      node.files.forEach(f => {
        const show = matchFile(f.path);
        f._el = f._el || treeEl.querySelector(`.file[data-path="${CSS.escape(f.path)}"]`);
        if(f._el){ f._el.style.display = show ? '' : 'none'; if(show) anyVisible=true; }
      });
      if(node._dirEl === undefined && node.name){
        // best-effort: find the dir container by its label text
      }
      return anyVisible;
    }
    walk(tree);
    // expand all so matches are visible
    document.querySelectorAll('.dir.collapsed').forEach(d => d.classList.remove('collapsed'));
    // hide empty dir rows (simple pass: hide .dir with no visible .file descendants)
    document.querySelectorAll('.dir').forEach(dir => {
      const hasFile = dir.querySelector('.file:not([style*="none"])');
      dir.style.display = hasFile ? '' : 'none';
    });
  }
  qEl.addEventListener('input', () => filter(qEl.value));
})();
</script>
